name: build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check repository
        run: node tools/check.mjs

      - name: Build package
        shell: pwsh
        run: ./tools/build-package.ps1 -Version "${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '0.1.0' }}"

      - name: Collect artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item -Path ..\..\releases\ddys-jellyfin-v*.zip -Destination dist -Force

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ddys-jellyfin
          path: dist/ddys-jellyfin-v*.zip
